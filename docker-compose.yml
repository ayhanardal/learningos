services:
  dashboard:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: learningos-dashboard
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ../..:/workspace
      - ./backend:/app
    ports:
      - "${DASHBOARD_PORT:-8001}:8000"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
