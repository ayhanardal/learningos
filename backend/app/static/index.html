      topSubjHtml += '<span style="font-size:10px; background:rgba(255,255,255,0.06); border:1px solid var(--border); padding:1px 6px; border-radius:4px; margin-left:4px; font-weight:600; color:var(--text)">' + esc(sName) + '</span>';
    });

    var subHeaderHtml = '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; border-bottom:1px solid var(--border); padding-bottom:8px">' +
      '<div style="display:flex; align-items:center; gap:8px">' +
        '<span style="font-size:11px; color:var(--text2)">Ağırlık:</span>' +
        '<div style="height:6px; display:flex; border-radius:3px; overflow:hidden; background:var(--border); width:100px" title="GY-GK: %' + wStats.gygk_pct + ' | Alan: %' + wStats.alan_pct + '">' +
          '<div style="width:' + wStats.gygk_pct + '%; background:var(--accent)"></div>' +
          '<div style="width:' + wStats.alan_pct + '%; background:var(--accent2)"></div>' +
        '</div>' +
        '<span style="font-size:10px; color:var(--text2)">%' + wStats.gygk_pct + ' / %' + wStats.alan_pct + '</span>' +
      '</div>' +
      '<div style="display:flex; align-items:center">' +
        '<span style="font-size:11px; color:var(--text2); margin-right:4px">🔥 Odak:</span>' +
        topSubjHtml +
      '</div>' +
    '</div>';

    html += '<div class="card" style="border:1px solid var(--border); border-radius:12px; padding:16px">';
    html += '<h3 style="font-size:15px; font-weight:700; color:var(--text); margin-bottom:8px; display:flex; justify-content:space-between; align-items:center">' +
      '<span>' + esc(weekKey) + ' <span style="font-size:12px; color:var(--text2); font-weight:400; margin-left:6px">' + dateRangeStr + '</span></span>' +
      badgeHtml +
      '</h3>';
    html += subHeaderHtml;

    var startDayLocal = new Date(days[0].date + 'T00:00:00');
    var firstDayOfWeek = startDayLocal.getDay();
    var paddingCount = firstDayOfWeek === 0 ? 6 : firstDayOfWeek - 1;

    // 1. O haftanın içine atanmış tüm konuları ders bazında grupla
    var weekTopics = {};
    days.forEach(function(dayEntry) {
      var allTasks = (dayEntry.genel || []).concat(dayEntry.alan || []);
      allTasks.forEach(function(t) {
        if (!weekTopics[t.subject]) weekTopics[t.subject] = {};
        if (!weekTopics[t.subject][t.topic]) weekTopics[t.subject][t.topic] = 0;
        weekTopics[t.subject][t.topic]++;
      });
    });
    
    var wSubjs = Object.keys(weekTopics);
    var safeWeekId = escAttr(weekKey.replace(/\s+/g, ''));

    html += '<div style="display:grid; grid-template-columns:220px 1fr 220px; gap:16px; align-items:stretch; margin-top:12px">';
    
    // 1. Kolon (Sol Pembe Panel)
    html += '<div style="background:rgba(236, 72, 153, 0.05); border:1px solid rgba(236, 72, 153, 0.2); border-radius:10px; padding:12px; display:flex; flex-direction:column; overflow:hidden">';
    html += '<h4 style="font-size:11px; font-weight:700; color:var(--text); margin-bottom:10px; text-transform:uppercase; border-bottom:1px solid var(--border); padding-bottom:6px">📌 Konu Dağılımı</h4>';
    
    html += '<div style="flex:1; overflow-y:auto; padding-right:4px;">';
    wSubjs.forEach(function(s) {
      var sColor = baseColors[s] || 'var(--accent)';
      html += '<div style="margin-bottom: 12px;">';
      html += '<div style="color: ' + sColor + '; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 4px;">' + esc(s) + '</div>';
      var topics = Object.keys(weekTopics[s]).sort(function(a,b){ return weekTopics[s][b] - weekTopics[s][a]; });
      topics.forEach(function(top) {
        html += '<div style="border-left: 3px solid ' + sColor + '; padding-left: 8px; color: var(--text2); font-size: 0.85rem; margin-bottom: 4px;">';
        html += '<div style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="' + escAttr(top) + '">' + esc(top) + ' <span style="font-size:0.75rem; opacity:0.7;">(' + weekTopics[s][top] + ' Otr)</span></div>';
        html += '</div>';
      });
      html += '</div>';
    });
    html += '</div>';
    html += '</div>';
    
    // 2. Kolon (Takvim Grid'i)
    html += '<div style="flex:1; min-width:0; overflow-x:hidden;">';
    html += '<div style="display:grid; grid-template-columns:repeat(7, 1fr); gap:8px">';

    dayNames.forEach(function(dName) {
      html += '<div style="font-size:10px; font-weight:700; color:var(--text2); text-transform:uppercase; text-align:center; padding-bottom:6px">' + dName.substring(0, 3) + '</div>';
    });

    for (var padIdx = 0; padIdx < paddingCount; padIdx++) {
      html += '<div style="background:transparent; border:none; min-height:95px"></div>';
    }

    days.forEach(function(dayEntry) {
      var dayDate = new Date(dayEntry.date + 'T00:00:00');
      var isToday = dayEntry.date === todayStr;
      var todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      var isPast = dayDate < todayMidnight;

      var dayClass = isToday ? 'current-day-focus' : '';
      var opacityStyle = isPast ? 'opacity: 0.4' : 'opacity: 1';

      html += '<div class="' + dayClass + '" style="background:var(--surface2); border-radius:8px; padding:8px; min-height:95px; display:flex; flex-direction:column; justify-content:space-between; border: 1px solid var(--border); overflow:hidden; ' + opacityStyle + '">';
      html += '<div style="font-size:10px; font-weight:600; color:var(--text2); text-align:right">' + dayEntry.date.substring(8, 10) + '</div>';

      var tasksHtml = '<div style="display:flex; flex-direction:column; gap:4px; margin-top:4px">';
      var allTasks = (dayEntry.genel || []).concat(dayEntry.alan || []);
      if (allTasks.length > 0) {
        allTasks.forEach(function(t) {
          var col = subjectColors[t.subject] || 'background:rgba(255,255,255,0.08); color:var(--text)';
          var topicName = t.topic ? t.topic : "";
          var shortTopic = topicName.length > 16 ? topicName.substring(0, 16) + '...' : topicName;
          var displayTitle = esc(t.subject) + (shortTopic ? ' <span style="font-size:0.85em; opacity:0.8;">| ' + esc(shortTopic) + '</span>' : '');
          tasksHtml += '<div style="padding:2px 4px; border-radius:4px; font-size:9px; font-weight:700; text-align:center; text-overflow:ellipsis; overflow:hidden; white-space:nowrap; ' + col + '" title="' + esc(t.subject) + ': ' + esc(t.topic) + '">' +
            displayTitle +
            '</div>';
        });
      } else {
        tasksHtml += '<div style="font-size:9px; color:var(--text2); text-align:center; margin-top:8px">Boş</div>';
      }
      tasksHtml += '</div>';

      html += tasksHtml;
      html += '<div style="font-size:9px; font-weight:700; color:var(--accent); text-align:left; margin-top:4px">' + (dayEntry.total_hours || 0) + 's</div>';
      html += '</div>';
    });

    var totalCells = paddingCount + days.length;
    var remainingPadding = (7 - (totalCells % 7)) % 7;
    for (var fillIdx = 0; fillIdx < remainingPadding; fillIdx++) {
      html += '<div style="background:transparent; border:none; min-height:95px"></div>';
    }

    html += '</div>'; // takvim grid'i sonu
    html += '</div>'; // sol sütun sonu

    // 3. Kolon (Mini Dağılım Paneli)
    html += '<div style="background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px; display:flex; flex-direction:column; justify-content:space-between; position:relative; z-index:10;">';
    html += '<div>';
    html += '<h4 style="font-size:11px; font-weight:700; color:var(--text); margin-bottom:10px; text-transform:uppercase; border-bottom:1px solid var(--border); padding-bottom:6px">📊 Haftalık Dağılım</h4>';
    
    var wDist = wData.weekly_distribution || {};
    var sortedSubjs = Object.keys(wDist).sort(function(a, b) {
      return wDist[b].hours - wDist[a].hours;
    });

    var distHtml = '<div style="display:flex; flex-direction:column; gap:8px">';
    sortedSubjs.forEach(function(subj) {
      var item = wDist[subj];
      var barColor = 'var(--accent)';
      if (subjectColors[subj]) {
        var match = subjectColors[subj].match(/color:\s*(#[0-9a-fA-F]+|var\(--[a-zA-Z0-9_-]+\))/);
        if (match) barColor = match[1];
      }
      
      distHtml += '<div style="margin-bottom:8px">' +
        '<div style="display:flex; justify-content:space-between; font-size:11px; font-weight:700; margin-bottom:2px; color:var(--text)">' +
          '<span>' + esc(subj) + '</span>' +
          '<span>%' + item.pct + '</span>' +
        '</div>' +
        '<div style="font-size:9px; color:var(--text2); margin-bottom:4px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">' +
          item.hours + 's | ' + Math.round(item.hours / 1.5) + ' Oturum | ' + item.questions + ' Soru' +
        '</div>' +
        '<div style="height:5px; background:var(--surface); border-radius:2.5px; overflow:hidden; border: 1px solid var(--border)">' +
          '<div style="width:' + item.pct + '%; height:100%; background:' + barColor + '; border-radius:2.5px"></div>' +
        '</div>' +
      '</div>';
    });
    distHtml += '</div>';
    
    html += distHtml;
    html += '</div>';
    html += '<div style="font-size:9px; color:var(--text2); text-align:right; margin-top:8px; border-top:1px solid var(--border); padding-top:6px">Konu odaklı asenkron dağılım</div>';
    html += '</div>'; // sağ sütun sonu
    
    html += '</div>'; // yatay flex kapsayıcı sonu
    html += '</div>'; // card end
  });

  html += '</div>';
  el.innerHTML = html;
}

function getTrMonthName(monthIdx) {
  var months = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
  return months[monthIdx] || '';
}

function renderAdequacy(adequacyData) {
  var el = document.getElementById('roadmap-adequacy-report');
  if (!el) return;
  if (!adequacyData || adequacyData.error) { el.innerHTML = errHtml(adequacyData ? adequacyData.error : 'Veri alınamadı'); return; }
  
  var score = adequacyData.adequacy_score;
  var capScore = Math.min(100, score);
  
  var badgesHtml = '<div style="display:grid; grid-template-columns:repeat(2, 1fr); gap:8px">';
  for (var subj in adequacyData.subject_requirements) {
    var req = adequacyData.subject_requirements[subj];
    badgesHtml += '<div style="background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:6px 10px; font-size:11px; font-weight:600; display:flex; justify-content:space-between; align-items:center; gap:8px">' +
      '<span>' + esc(subj) + '</span>' +
      '<strong style="color:var(--accent)">' + req + ' Oturum</strong>' +
      '</div>';
  }
  badgesHtml += '</div>';

  var warningHtml = '';
  if (score < 100) {
    var btList = Object.keys(adequacyData.bottlenecks);
    var btStr = btList.length > 0 ? btList.join(', ') : 'Bulunmuyor';
    warningHtml = '<div style="background:rgba(239, 68, 68, 0.08); border:1px solid rgba(239, 68, 68, 0.15); border-radius:10px; padding:12px; color:#f87171; font-size:12px; font-weight:600; line-height:1.5; height: 100%; display: flex; flex-direction: column; justify-content: center">' +
      '<div style="font-size:14px; margin-bottom:4px; color:#f87171">⚠️ Kapasite Aşımı Tespit Edildi</div>' +
      'Mevcut ' + adequacyData.total_available_sessions + ' oturum kapasiteniz, yüksek net hedefleriniz için gereken ' + adequacyData.total_required_sessions + ' oturumu tam karşılamıyor. Hedefleri veya soru çarpanlarını optimize edebilirsiniz. ' +
      '<div style="margin-top:6px; font-size:11px; color:var(--text2)">Darboğaza giren dersler: ' + esc(btStr) + '</div>' +
      '</div>';
  } else {
    warningHtml = '<div style="background:rgba(16, 185, 129, 0.08); border:1px solid rgba(16, 185, 129, 0.15); border-radius:10px; padding:12px; color:#34d399; font-size:12px; font-weight:600; line-height:1.5; height: 100%; display: flex; flex-direction: column; justify-content: center">' +
      '<div style="font-size:14px; margin-bottom:4px; color:#34d399">✓ Plan Yeterli Durumda</div>' +
      '60 günlük (120 oturum) süre, müfredat hedeflerinizi tam olarak karşılamaya yetiyor.' +
      '</div>';
  }

  el.innerHTML = '<div class="card" style="border:1px solid var(--border); padding:16px; border-radius:12px">' +
    '<h3 style="font-size:15px; font-weight:700; margin-bottom:12px; color:var(--text)">🧪 Plan Yeterlilik ve Simülasyon Raporu</h3>' +
    '<div style="display:grid; grid-template-columns:1fr 1.8fr 1.8fr; gap:24px; margin-top:16px; align-items:stretch">' +
      '<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; border-right:1px solid var(--border); padding-right:16px">' +
        '<div style="width:110px; height:110px; border-radius:50%; background:conic-gradient(var(--accent) 0% ' + capScore + '%, var(--surface2) ' + capScore + '% 100%); display:flex; align-items:center; justify-content:center; position:relative; box-shadow:0 4px 10px rgba(0,0,0,0.2)">' +
          '<div style="width:88px; height:88px; border-radius:50%; background:var(--surface); display:flex; flex-direction:column; align-items:center; justify-content:center">' +
            '<span style="font-size:20px; font-weight:800; color:var(--text)">%' + score + '</span>' +
            '<span style="font-size:9px; color:var(--text2); text-transform:uppercase; font-weight:700">Yeterlilik</span>' +
          '</div>' +
        '</div>' +
        '<div style="font-size:11px; color:var(--text2); margin-top:8px; text-align:center">' + adequacyData.total_available_sessions + ' / ' + adequacyData.total_required_sessions + ' Oturum</div>' +
      '</div>' +
      '<div>' +
        '<h4 style="font-size:12px; font-weight:700; color:var(--text2); margin-bottom:10px; text-transform:uppercase">Ders Oturum İhtiyaçları</h4>' +
        badgesHtml +
      '</div>' +
      '<div>' +
        warningHtml +
      '</div>' +
    '</div>' +
  '</div>';
}



loadDashboard();

document.addEventListener('keydown', function(e) {
    // Sadece Editor.js içindeyken ve Ctrl+Enter (veya Cmd+Enter) basıldığında çalışır
    if (e.target.closest('#editorjs') && (e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        
        // Tarayıcının kendi saçma sapan yeni satır oluşturma huyunu durdur
        e.preventDefault();
        e.stopPropagation();
        
        // Sisteme sahte bir 'Shift + Enter' tuşlaması gönder
        // Editor.js bu sahte tuşlamayı yakalayacak ve mevcut bloğu bozmadan kusursuzca alt satıra geçirecektir.
        const shiftEnterEvent = new KeyboardEvent('keydown', {
            key: 'Enter',
            code: 'Enter',
            keyCode: 13,
            which: 13,
            shiftKey: true, // Sihir burada: Ctrl'yi Shift'e çeviriyoruz
            bubbles: true,
            cancelable: true
        });
        
        e.target.dispatchEvent(shiftEnterEvent);
    }
});
</script>
